[tool.ruff]
target-version = "py313"
line-length = 120
extend-exclude = [
  "_snapshots",
  ".venv",
  "__pycache__",
  "build",
  "dist",
  "generated",
  "release_candidate",
  "frontier_smoke_*",
  "frontier_overlay_check_*",
  "frontier_manual_*",
  "frontier_noini_*",
  "temp_video_frames*",
  "temp_video_tools",
  "tools",
]

[tool.ruff.lint]
select = ["E", "F", "I", "W"]
ignore = ["E402", "E501", "F401"]

[tool.ruff.lint.isort]
known-first-party = ["frontier_rpg"]

[tool.mypy]
python_version = "3.13"
pretty = true
show_error_codes = true
warn_return_any = true
warn_unused_configs = true
exclude = '''(?x)(
    (^|/)_snapshots/
  | (^|/)\.venv/
  | (^|/)__pycache__/
  | (^|/)build/
  | (^|/)dist/
  | (^|/)generated/
  | (^|/)release_candidate/
  | (^|/)frontier_smoke_[^/]+/
  | (^|/)frontier_overlay_check_[^/]+/
  | (^|/)frontier_manual_[^/]+/
  | (^|/)frontier_noini_[^/]+/
  | (^|/)temp_video_frames[^/]*/
  | (^|/)temp_video_tools/
  | (^|/)tools/
)'''

[[tool.mypy.overrides]]
module = [
  "frontier_rpg.ui",
  "frontier_rpg.platform.localization",
]
ignore_errors = true
